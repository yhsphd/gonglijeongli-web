openapi: 3.0.0
info:
  title: Gonglijeongli API
  description: API documentation for Gonglijeongli Web Project
  version: 1.0.0
servers:
  - url: http://localhost:3000/api
    description: Local Development Server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Error:
      type: object
      properties:
        message:
          type: string
        code:
          type: string

    GalleryItem:
      type: object
      properties:
        id:
          type: integer
        src:
          type: string
        source:
          type: string
          enum: [twitter, pixiv, local]
        originalUrl:
          type: string
      required:
        - id
        - src
        - source

    EventItem:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        date:
          type: string
        location:
          type: string
        thumb:
          type: string
        thumbnail:
          type: string
        link:
          type: string
        status:
          type: string
          enum: [upcoming, ongoing, ended]
      required:
        - id
        - title
        - date
        - location
        - status

    WorkItem:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        date:
          type: string
        thumb:
          type: string
        link:
          type: string
        tags:
          type: array
          items:
            type: string
      required:
        - id
        - title
        - date
        - tags

    NewsPost:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        content:
          type: object
          description: Tiptap JSON content
        thumbnail:
          type: string
        date:
          type: string
        views:
          type: integer
        likes:
          type: integer
      required:
        - id
        - title
        - content
        - date
        - views
        - likes

    NewsPostSummary:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        thumbnail:
          type: string
        date:
          type: string
        views:
          type: integer
        likes:
          type: integer
      required:
        - id
        - title
        - date
        - views
        - likes

paths:
  /auth/login:
    post:
      tags:
        - Auth
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        "200":
          description: Successful login
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
        "401":
          description: Unauthorized

  /auth/me:
    get:
      tags:
        - Auth
      summary: Get current user info
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User info
        "401":
          description: Unauthorized

  /gallery:
    get:
      tags:
        - Gallery
      summary: Get gallery items
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 12
      responses:
        "200":
          description: A list of gallery items
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/GalleryItem"
                  total:
                    type: integer
    post:
      tags:
        - Gallery
      summary: Create a gallery item
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GalleryItem"
      responses:
        "201":
          description: Created
        "401":
          description: Unauthorized

  /gallery/{id}:
    put:
      tags:
        - Gallery
      summary: Update a gallery item
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GalleryItem"
      responses:
        "200":
          description: Updated
        "401":
          description: Unauthorized
    delete:
      tags:
        - Gallery
      summary: Delete a gallery item
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized

  /events:
    get:
      tags:
        - Events
      summary: Get events
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: A list of events
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/EventItem"
                  total:
                    type: integer
    post:
      tags:
        - Events
      summary: Create an event
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventItem"
      responses:
        "201":
          description: Created
        "401":
          description: Unauthorized

  /events/{id}:
    put:
      tags:
        - Events
      summary: Update an event
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventItem"
      responses:
        "200":
          description: Updated
        "401":
          description: Unauthorized
    delete:
      tags:
        - Events
      summary: Delete an event
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized

  /works:
    get:
      tags:
        - Works
      summary: Get works
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: A list of works
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/WorkItem"
                  total:
                    type: integer
    post:
      tags:
        - Works
      summary: Create a work
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkItem"
      responses:
        "201":
          description: Created
        "401":
          description: Unauthorized

  /works/{id}:
    put:
      tags:
        - Works
      summary: Update a work
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkItem"
      responses:
        "200":
          description: Updated
        "401":
          description: Unauthorized
    delete:
      tags:
        - Works
      summary: Delete a work
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized

  /news:
    get:
      tags:
        - News
      summary: Get news posts
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: A list of news posts
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/NewsPostSummary"
                  total:
                    type: integer
    post:
      tags:
        - News
      summary: Create a news post
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewsPost"
      responses:
        "201":
          description: Created
        "401":
          description: Unauthorized

  /news/{id}:
    get:
      tags:
        - News
      summary: Get a news post by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: News post details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsPost"
        "404":
          description: Not found
    put:
      tags:
        - News
      summary: Update a news post
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewsPost"
      responses:
        "200":
          description: Updated
        "401":
          description: Unauthorized
    delete:
      tags:
        - News
      summary: Delete a news post
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized

  /upload:
    post:
      tags:
        - Upload
      summary: Upload an image or file
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: File uploaded successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
        "401":
          description: Unauthorized
