name: CI/CD

on:
  push:
    branches: [master]

jobs:
  # ──────────────────────────────────────────────
  # Job 1: 빌드 & 아티팩트 생성
  # ──────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            front/package-lock.json
            back/package-lock.json

      - name: Install Dependencies
        run: npm run install:all

      - name: Build
        run: npm run build

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            front/dist/
            back/dist/
            back/package.json
            back/package-lock.json
          retention-days: 3

  # ──────────────────────────────────────────────
  # Job 2: OCI 서버 배포
  # ──────────────────────────────────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output

      - name: Transfer Artifacts to OCI
        uses: appleboy/scp-action@master
        with:
          host: ${{ vars.OCI_HOST }}
          username: ${{ vars.OCI_USERNAME }}
          key: ${{ secrets.OCI_SSH_KEY }}
          source: "front/dist/**,back/dist/**,back/package.json,back/package-lock.json"
          target: "/home/ubuntu/gonglijeongli-web"
          strip_components: 0

      - name: Deploy on OCI
        uses: appleboy/ssh-action@master
        with:
          host: ${{ vars.OCI_HOST }}
          username: ${{ vars.OCI_USERNAME }}
          key: ${{ secrets.OCI_SSH_KEY }}
          script: |
            set -euo pipefail

            FRONT_SRC="/home/ubuntu/gonglijeongli-web/front/dist"
            FRONT_DST="/var/www/gonglijeongli"

            # 프론트 정적 파일 배포
            if [ ! -f "$FRONT_SRC/index.html" ]; then
              echo "[ERROR] $FRONT_SRC/index.html not found. Frontend build artifact missing." >&2
              exit 1
            fi

            sudo mkdir -p "$FRONT_DST"
            sudo rsync -a --delete "$FRONT_SRC/" "$FRONT_DST/"
            sudo chown -R root:www-data "$FRONT_DST"
            sudo find "$FRONT_DST" -type d -exec chmod 755 {} \;
            sudo find "$FRONT_DST" -type f -exec chmod 644 {} \;

            # 백엔드 의존성 설치 (프로덕션용)
            cd /home/ubuntu/gonglijeongli-web/back
            npm ci --omit=dev

            # PM2를 이용한 백엔드 재시작
            pm2 delete gljl-back || true
            PORT=3000 pm2 start dist/index.js --name gljl-back
            pm2 save

            # Nginx 설정 리로드
            sudo nginx -t
            sudo systemctl reload nginx

            # 스모크 체크
            curl -fsSI http://127.0.0.1/ | head -n 5 || true