name: Deploy to OCI (ARM64)

on:
  push:
    branches: [ master ] # master 브랜치 푸시 시 작동

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # 프로젝트 권장 버전 반영
          cache: 'npm'
          cache-dependency-path: |
            front/package-lock.json
            back/package-lock.json

      # 1. Frontend 빌드 (GitHub Actions 서버에서 수행하여 OCI 부하 감소)
      - name: Build Frontend
        working-directory: ./front
        run: |
          npm ci
          npm run build # front/dist 생성

      # 2. Backend 빌드 (TypeScript -> JS 변환)
      - name: Build Backend
        working-directory: ./back
        run: |
          npm ci
          npm run build # back/dist 생성

      # 3. 아티팩트 전송 (SCP)
      # 빌드 결과물과 서버 실행에 필요한 파일만 전송합니다.
      - name: Transfer Artifacts to OCI
        uses: appleboy/scp-action@master
        with:
          host: ${{ vars.OCI_HOST }}
          username: ${{ vars.OCI_USERNAME }}
          key: ${{ secrets.OCI_SSH_KEY }}
          source: "front/dist/**,back/dist/**,back/package.json,back/package-lock.json"
          target: "/home/ubuntu/gonglijeongli-web"
          strip_components: 0

      # 4. 서버 측 실행 및 서비스 갱신
      - name: Post-Deployment on OCI
        uses: appleboy/ssh-action@master
        with:
          host: ${{ vars.OCI_HOST }}
          username: ${{ vars.OCI_USERNAME }}
          key: ${{ secrets.OCI_SSH_KEY }}
          script: |
            set -euo pipefail

            FRONT_SRC="/home/ubuntu/gonglijeongli-web/front/dist"
            FRONT_DST="/var/www/gonglijeongli"

            # 프론트 정적 파일 배포: nginx가 접근 가능한 /var/www 아래로 동기화
            # (home 디렉터리 권한 문제로 Permission denied가 나는 케이스 방지)
            if [ ! -f "$FRONT_SRC/index.html" ]; then
              echo "[ERROR] $FRONT_SRC/index.html not found. Frontend build artifact missing." >&2
              exit 1
            fi

            sudo mkdir -p "$FRONT_DST"
            sudo rsync -a --delete "$FRONT_SRC/" "$FRONT_DST/"
            sudo chown -R root:www-data "$FRONT_DST"
            sudo find "$FRONT_DST" -type d -exec chmod 755 {} \;
            sudo find "$FRONT_DST" -type f -exec chmod 644 {} \;

            # 백엔드 의존성 설치 (프로덕션용 최소화)
            cd /home/ubuntu/gonglijeongli-web/back
            npm ci --omit=dev # OCI ARM64 환경에 맞는 네이티브 모듈 설치 보장

            # PM2를 이용한 백엔드 무중단 재시작
            # 인덱스 경로: back/dist/index.js (프로젝트 스캔 결과 반영)
            pm2 delete gljl-back || true
            PORT=3000 pm2 start dist/index.js --name gljl-back
            pm2 save

            # Nginx 설정 반영 (인증서 갱신 훅과 별개로 설정 파일 리로드)
            sudo nginx -t
            sudo systemctl reload nginx

            # 로컬 스모크 체크 (실패해도 배포 전체를 막진 않음)
            curl -fsSI http://127.0.0.1/ | head -n 5 || true