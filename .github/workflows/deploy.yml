name: CI/CD

on:
  push:
    branches: [master]

jobs:
  # ──────────────────────────────────────────────
  # Job 1: 빌드 & 아티팩트 생성
  # ──────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install Dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Verify Swagger Output is Committed
        run: |
          # 백엔드 빌드 시 swagger.js가 실행되어 swagger-output.json이 갱신됨.
          # 만약 개발자가 로컬에서 재생성한 파일과 커밋된 파일이 다르다면(또는 파일이 없다면)
          # git diff가 발생하므로 에러 처리하여 파이프라인 중단.
          if [[ -n $(git status --porcelain back/src/swagger-output.json) ]]; then
            echo "::error::swagger-output.json 가 최신 상태가 아닙니다! 로컬 백엔드에서 npm run dev나 swagger.js를 실행하여 변경된 swagger-output.json을 커밋해 주세요."
            git diff back/src/swagger-output.json
            exit 1
          fi

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            package.json
            package-lock.json
            front/package.json
            front/dist/
            back/package.json
            back/dist/
            back/prisma/
            back/prisma.config.ts
          retention-days: 3

  # ──────────────────────────────────────────────
  # Job 2: OCI 서버 배포
  # ──────────────────────────────────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output

      - name: Create Backend .env File
        run: |
          cat << EOF > back/.env
          PORT=3000
          NODE_ENV=production
          CORS_ALLOWED_ORIGINS=${{ vars.CORS_ALLOWED_ORIGINS }}
          CORS_ALLOWED_DOMAIN=${{ vars.CORS_ALLOWED_DOMAIN }}
          SESSION_SECRET=${{ secrets.SESSION_SECRET }}
          ADMIN_USERNAME=${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
          DATABASE_URL="file:${{ vars.OCI_DEPLOY_PATH }}/gonglijeongli-data/prod.db"
          UPLOAD_DIR="${{ vars.OCI_DEPLOY_PATH }}/gonglijeongli-data/uploads"
          EOF

      - name: Prepare Deployment Directory
        uses: appleboy/ssh-action@master
        with:
          host: ${{ vars.OCI_HOST }}
          username: ${{ vars.OCI_USERNAME }}
          key: ${{ secrets.OCI_SSH_KEY }}
          script: |
            # 영구 데이터 저장용 디렉터리 생성
            mkdir -p ${{ vars.OCI_DEPLOY_PATH }}/gonglijeongli-data/uploads

            # 이전 임시 디렉터리 삭제 및 새 임시 디렉터리 생성
            rm -rf ${{ vars.OCI_DEPLOY_PATH }}/gonglijeongli-web-tmp
            mkdir -p ${{ vars.OCI_DEPLOY_PATH }}/gonglijeongli-web-tmp

      - name: Transfer Artifacts to OCI
        uses: appleboy/scp-action@master
        with:
          host: ${{ vars.OCI_HOST }}
          username: ${{ vars.OCI_USERNAME }}
          key: ${{ secrets.OCI_SSH_KEY }}
          source: "package.json,package-lock.json,front/package.json,front/dist/**,back/dist/**,back/package.json,back/prisma/**,back/prisma.config.ts,back/.env"
          target: "${{ vars.OCI_DEPLOY_PATH }}/gonglijeongli-web-tmp"
          strip_components: 0

      - name: Deploy on OCI
        uses: appleboy/ssh-action@master
        with:
          host: ${{ vars.OCI_HOST }}
          username: ${{ vars.OCI_USERNAME }}
          key: ${{ secrets.OCI_SSH_KEY }}
          script: |
            set -euo pipefail

            DEPLOY_PATH="${{ vars.OCI_DEPLOY_PATH }}"

            # 새 빌드 파일 교체 (기존 소스 삭제 후 tmp에서 이동)
            sudo rm -rf "$DEPLOY_PATH/gonglijeongli-web"
            sudo mv "$DEPLOY_PATH/gonglijeongli-web-tmp" "$DEPLOY_PATH/gonglijeongli-web"
            sudo chown -R $USER:$USER "$DEPLOY_PATH/gonglijeongli-web"

            FRONT_SRC="$DEPLOY_PATH/gonglijeongli-web/front/dist"
            FRONT_DST="/var/www/gonglijeongli"

            # 프론트 정적 파일 배포 (심볼릭 링크 사용)
            if [ ! -f "$FRONT_SRC/index.html" ]; then
              echo "[ERROR] $FRONT_SRC/index.html not found. Frontend build artifact missing." >&2
              exit 1
            fi

            # 기존 심볼릭 링크(또는 디렉터리) 삭제 후 dist 폴더 전체를 링크
            sudo rm -rf "$FRONT_DST"
            sudo ln -s "$FRONT_SRC" "$FRONT_DST"

            sudo chown -R root:www-data "$FRONT_SRC"
            sudo find "$FRONT_SRC" -type d -exec chmod 755 {} \;
            sudo find "$FRONT_SRC" -type f -exec chmod 644 {} \;

            # Nginx가 해당 심볼릭 링크를 따라가 원본 파일들에 접근하려면 부모 경로들에 x(실행, 탐색) 권한이 필요함
            sudo chmod +x "/home" "$DEPLOY_PATH" "$DEPLOY_PATH/gonglijeongli-web" "$DEPLOY_PATH/gonglijeongli-web/front"

            # 백엔드 의존성 설치 (프로덕션용)
            cd "$DEPLOY_PATH/gonglijeongli-web"
            npm ci --omit=dev --workspace=back

            # 마이그레이션 적용 (스키마 변경사항만 안전하게 반영)
            cd "$DEPLOY_PATH/gonglijeongli-web/back"
            npx prisma migrate deploy

            # PM2를 이용한 백엔드 재시작
            pm2 delete gljl-back || true
            PORT=3000 pm2 start dist/index.js --name gljl-back
            pm2 save

            # Nginx 설정 리로드
            sudo nginx -t
            sudo systemctl reload nginx

            # 스모크 체크
            curl -fsSI http://127.0.0.1/ | head -n 5 || true
